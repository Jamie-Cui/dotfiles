# Personal Outlook.com gateway for Emacs Gnus.
# OAuth tokens and credentials remain outside the dotfiles repository.

# Run headlessly as a per-user service and authenticate with Microsoft's
# device-code flow.  The Graph backend supports personal Outlook.com accounts.
davmail.server=true
davmail.mode=O365Graph
davmail.authentication=O365DeviceCode
# DavMail 6.8.1's device-code authenticator otherwise defaults to the legacy
# OAuth v1 endpoint, even in Graph mode.  Personal Microsoft accounts require
# the v2.0 endpoint, so keep OIDC explicit rather than relying on mode defaults.
davmail.enableOidc=true
davmail.url=https://outlook.office365.com/EWS/Exchange.asmx
davmail.loginUrl=https://login.microsoftonline.com
davmail.outlookUrl=https://outlook.office365.com
davmail.graphUrl=https://graph.microsoft.com
davmail.oauth.tenantId=common
davmail.oauth.scope=openid profile offline_access Mail.ReadWrite Mail.Send
davmail.oauth.tokenFilePath=.local/state/davmail/oauth-tokens.properties

# Only expose the two protocols used by Emacs, and only on loopback.
davmail.imapPort=1143
davmail.smtpPort=1025
davmail.popPort=
davmail.caldavPort=
davmail.ldapPort=
davmail.allowRemote=false
davmail.bindAddress=127.0.0.1
davmail.clientSoTimeout=300
davmail.enableKeepAlive=true

# Exchange should keep the authoritative copy in Sent Items.
davmail.smtpSaveInSent=true

# No GUI or update checks are needed in server mode.
davmail.disableUpdateCheck=true
davmail.showStartupBanner=false
davmail.enableTray=false
davmail.disableGuiNotifications=true

# Keep logs private and bounded.  INFO includes the one-time device-code prompt.
davmail.logFilePath=.local/state/davmail/davmail.log
davmail.logFileSize=1MB
log4j.logger.davmail=INFO
log4j.logger.httpclient.wire=WARN
log4j.logger.httpclient=WARN
log4j.rootLogger=WARN
